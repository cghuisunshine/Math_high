<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML 内容目录</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f5f7f6;
      --surface: #ffffff;
      --text: #173b37;
      --muted: #637672;
      --accent: #087d70;
      --border: #d8e3df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--background);
      color: var(--text);
      font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    header,
    main {
      width: min(1200px, calc(100% - 32px));
      margin-inline: auto;
    }

    header { padding: 48px 0 24px; }

    h1 { margin: 0 0 8px; font-size: clamp(28px, 5vw, 44px); }
    header p { margin: 0; color: var(--muted); }

    article {
      overflow: hidden;
      margin-bottom: 40px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 12px 32px rgb(23 59 55 / 8%);
    }

    .item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }

    h2 { margin: 0; font-size: 18px; }

    a {
      flex: none;
      padding: 9px 14px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover { filter: brightness(.92); }

    iframe {
      display: block;
      width: 100%;
      height: 75vh;
      min-height: 560px;
      border: 0;
      background: white;
    }

    @media (max-width: 600px) {
      header { padding-top: 32px; }
      .item-header { align-items: flex-start; flex-direction: column; }
      iframe { min-height: 480px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>HTML 内容目录</h1>
    <p>本目录包含当前文件夹中的所有其他 HTML 页面。</p>
  </header>

  <main>
    <article>
      <div class="item-header">
        <h2>均值不等式配凑技巧｜例题与详细解答</h2>
        <a href="均值不等式配凑技巧_例题与解答.html">单独打开</a>
      </div>
      <iframe
        src="均值不等式配凑技巧_例题与解答.html"
        title="均值不等式配凑技巧｜例题与详细解答"
        loading="lazy"
      ></iframe>
    </article>
  </main>
</body>
</html>
